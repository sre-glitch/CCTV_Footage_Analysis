services:
  api:
    image: node:20
    working_dir: /app
    command: sh -c "corepack enable && COREPACK_DEFAULT_TO_LATEST=0 pnpm install && COREPACK_DEFAULT_TO_LATEST=0 pnpm --filter @store/api prisma:generate && COREPACK_DEFAULT_TO_LATEST=0 pnpm --filter @store/api prisma:deploy && COREPACK_DEFAULT_TO_LATEST=0 pnpm --filter @store/api prisma:seed && COREPACK_DEFAULT_TO_LATEST=0 pnpm --filter @store/api dev"
    environment:
      DATABASE_URL: "file:./apps/api/prisma/dev.db"
      API_PORT: 4000
      STALE_FEED_MINUTES: 5
      NEXT_PUBLIC_API_URL: "http://localhost:4000"
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules

  web:
    image: node:20
    working_dir: /app
    command: sh -c "corepack enable && COREPACK_DEFAULT_TO_LATEST=0 pnpm install && COREPACK_DEFAULT_TO_LATEST=0 pnpm --filter @store/web dev"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:4000"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - api